name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          pnpm start &
          until curl -sf http://localhost:3000 > /dev/null; do sleep 1; done
          timeout 60 pnpm screenshots
          fuser -k 3000/tcp 2>/dev/null || true

      - name: Store screenshot baselines
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/store-baselines.py

      - name: Diff screenshots against baseline
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          pip install -r scripts/requirements.txt --quiet
          python3 scripts/diff-screenshots.py

      - name: Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Inject screenshots into PR description
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SCREENSHOT_DIR: pr-screenshots-changed
        run: |
          SCREENSHOT_MD=$(python3 scripts/upload-screenshots.py)
          current_body=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
          new_body=$(BODY="$current_body" SCREENSHOTS="$SCREENSHOT_MD" python3 scripts/inject-screenshots.py)
          gh pr edit "$PR_NUMBER" --body "$new_body"
