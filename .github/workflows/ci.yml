name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          pnpm start &
          until curl -sf http://localhost:3000 > /dev/null; do sleep 1; done
          pnpm screenshots
          pkill -f "next start" || true

      - name: Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Inject screenshots into PR description
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          SCREENSHOT_MD=""
          for img in test-results/screenshots/*.png; do
            [ -f "$img" ] || continue
            filename=$(basename "$img")
            label="${filename%.png}"
            b64=$(base64 < "$img" | tr -d '\n')
            sha=$(gh api "repos/$REPO/contents/screenshots/${PR_NUMBER}-${filename}" \
              --jq '.sha' 2>/dev/null || echo "")
            if [ -n "$sha" ]; then
              gh api "repos/$REPO/contents/screenshots/${PR_NUMBER}-${filename}" \
                -X PUT -f message="chore: update screenshot for PR #${PR_NUMBER}" \
                -f content="$b64" -f sha="$sha" -f branch="screenshots" > /dev/null
            else
              gh api "repos/$REPO/contents/screenshots/${PR_NUMBER}-${filename}" \
                -X PUT -f message="chore: add screenshot for PR #${PR_NUMBER}" \
                -f content="$b64" -f branch="screenshots" > /dev/null
            fi
            url="https://raw.githubusercontent.com/${REPO}/screenshots/screenshots/${PR_NUMBER}-${filename}"
            SCREENSHOT_MD="${SCREENSHOT_MD}**${label}**"$'\n'"![${label}](${url})"$'\n\n'
          done
          current_body=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
          new_body=$(BODY="$current_body" SCREENSHOTS="$SCREENSHOT_MD" python3 -c '
import re, os
body = os.environ["BODY"]
md = os.environ["SCREENSHOTS"]
repl = "<!-- screenshots-start -->\n" + md + "<!-- screenshots-end -->"
result = re.sub(r"<!-- screenshots-start -->.*?<!-- screenshots-end -->", repl, body, flags=re.DOTALL)
print(result, end="")
')
          gh pr edit "$PR_NUMBER" --body "$new_body"
