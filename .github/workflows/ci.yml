name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          pnpm start &
          until curl -sf http://localhost:3000 > /dev/null; do sleep 1; done
          pnpm screenshots
          pkill -f "next start" || true

      - name: Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Post screenshot comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          COMMENT="## Screenshots\n\n"
          for img in test-results/screenshots/*.png; do
            [ -f "$img" ] || continue
            filename=$(basename "$img")
            label="${filename%.png}"
            b64=$(base64 < "$img" | tr -d '\n')
            # Get existing file sha if it exists (needed for updates)
            sha=$(gh api "repos/$REPO/contents/screenshots/${PR_NUMBER}-${filename}" \
              --jq '.sha' 2>/dev/null || echo "")
            if [ -n "$sha" ]; then
              gh api "repos/$REPO/contents/screenshots/${PR_NUMBER}-${filename}" \
                -X PUT \
                -f message="chore: update screenshot for PR #${PR_NUMBER}" \
                -f content="$b64" \
                -f sha="$sha" \
                -f branch="screenshots" > /dev/null
            else
              gh api "repos/$REPO/contents/screenshots/${PR_NUMBER}-${filename}" \
                -X PUT \
                -f message="chore: add screenshot for PR #${PR_NUMBER}" \
                -f content="$b64" \
                -f branch="screenshots" > /dev/null
            fi
            url="https://raw.githubusercontent.com/${REPO}/screenshots/screenshots/${PR_NUMBER}-${filename}"
            COMMENT="${COMMENT}**${label}**\n![${label}](${url})\n\n"
          done
          # Delete any previous screenshot comment from this bot
          existing=$(gh api "repos/$REPO/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("## Screenshots")) | .id' | head -1)
          [ -n "$existing" ] && gh api "repos/$REPO/issues/comments/$existing" -X DELETE
          gh pr comment "$PR_NUMBER" --body "$(printf "$COMMENT")"
